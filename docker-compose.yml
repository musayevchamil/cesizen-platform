services:
  db:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: cesizen
      POSTGRES_USER: cesizen
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cesizen"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    profiles: [dev]
    build:
      context: .
      dockerfile: app/Dockerfile
      target: dev
    volumes:
      - ./app:/var/www/html
      - vendor:/var/www/html/vendor
    ports:
      - "8001:80"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: cesizen
      DB_USERNAME: cesizen
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy

  vite:
    profiles: [dev]
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./app:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - app

  app-prod:
    profiles: [prod]
    build:
      context: .
      dockerfile: app/Dockerfile
      target: production
    ports:
      - "8001:80"
    env_file:
      - app/.env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  vendor:
  node_modules:
